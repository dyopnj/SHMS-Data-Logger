[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  bblanchon/ArduinoJson @ ^7.0
  knolleary/PubSubClient @ ^2.8
  adafruit/Adafruit MPU6050 @ ^2.2
  adafruit/Adafruit Unified Sensor @ ^1.1
  adafruit/RTClib @ ^2.1
monitor_speed = 115200
board_build.f_cpu = 240000000L
