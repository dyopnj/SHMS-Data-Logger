<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/style.css">
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<title>SHMS - Analysis</title>
</head>
<body class="bg-background text-on-background font-body-md antialiased">
<aside class="sidebar fixed left-0 top-0 h-full flex flex-col p-4 z-40 bg-surface-container-low border-r border-outline-variant w-sidebar-width">

  <h1 class="font-headline-md font-bold text-primary">Bridge Monitor</h1>
  <p class="text-secondary font-label-mono uppercase tracking-widest text-[10px]">NODE STATUS: ACTIVE</p>
</div>
<nav class="space-y-2 flex-1">
  <a href="home.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg"><span class="material-symbols-outlined">dashboard</span><span class="nav-text font-body-md">Home</span></a>
  <a href="analysis.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg"><span class="material-symbols-outlined">show_chart</span><span class="nav-text font-body-md">Analysis</span></a>
  <a href="logs.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg"><span class="material-symbols-outlined">database</span><span class="nav-text font-body-md">Logs</span></a>
  <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-variant rounded-lg"><span class="material-symbols-outlined">settings</span><span class="nav-text font-body-md">Settings</span></a>
</nav>

  <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-error hover:bg-error-container/20 rounded-lg"><span class="material-symbols-outlined">logout</span><span class="nav-text font-body-md">Logout</span></a>
</div>
</aside>
<main class="ml-[260px] flex-1 min-h-screen">
<header class="sticky top-0 z-30 flex justify-between items-center w-full px-margin-desktop h-16 bg-background border-b border-outline-variant">
  <span class="font-headline-md font-bold text-primary">SHMS - SIMON BATAPA 2026</span>
  <div class="flex items-center gap-3">
    <span class="status-led online"></span>
    <span class="font-label-mono text-label-mono text-secondary">LIVE</span>
  </div>
</header>
<div class="p-margin-desktop">
<div class="flex items-center justify-between mb-4">
  <h1 class="font-headline-md text-headline-md text-on-surface">Structural Analysis</h1>
  <div class="flex items-center gap-4 text-xs font-label-mono">
    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm bg-primary"></span>Node 01</span>
    <span class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-sm bg-tertiary"></span>Node 02</span>
  </div>
</div>
<div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
  <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden h-[350px]" id="plot-rms"></div>
  <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden h-[350px]" id="plot-tilt"></div>
  <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden h-[350px]" id="plot-freq"></div>
  <div class="bg-surface-container border border-outline-variant rounded-xl overflow-hidden h-[350px]" id="plot-fft"></div>
</div>
</div>
<footer class="px-margin-desktop py-6 text-center">
  <p class="text-on-surface-variant font-label-mono text-[10px] tracking-widest uppercase">© 2026 SHMS | Simon Batapa Professional Series</p>
</footer>
</main>
<script src="assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  const cfg={paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',margin:{t:30,r:10,b:40,l:50},xaxis:{gridcolor:'#1b2122',tickfont:{color:'#869397',size:9},type:'date'},yaxis:{gridcolor:'#1b2122',tickfont:{color:'#869397',size:9}},legend:{font:{color:'#dee3e6',size:10}},hovermode:'x unified'};
  const line1={color:'#4cd7f6',width:2},line2={color:'#ffb95f',width:2};
  function gen(amp){const d1=[],d2=[];for(let i=0;i<60;i++){const t=new Date(Date.now()-(60-i)*2000);d1.push({x:t,y:amp*Math.sin(i/8)+amp*0.3*(Math.random()-0.5)});d2.push({x:t,y:amp*Math.cos(i/10)+amp*0.3*(Math.random()-0.5)});}return[d1,d2];}
  function makePlot(id,label,d1,d2){Plotly.newPlot(id,[{x:d1.map(p=>p.x),y:d1.map(p=>p.y),name:'Node 01',type:'scatter',mode:'lines',line:line1},{x:d2.map(p=>p.x),y:d2.map(p=>p.y),name:'Node 02',type:'scatter',mode:'lines',line:line2}],{...cfg,yaxis:{...cfg.yaxis,title:{text:label,font:{size:11,color:'#869397'}}}},{responsive:true,displayModeBar:false});}
  const [r1,r2]=gen(0.1);makePlot('plot-rms','RMS (m/s²)',r1,r2);
  const [t1,t2]=gen(0.5);makePlot('plot-tilt','Tilt Delta (°)',t1,t2);
  const [f1,f2]=gen(5);makePlot('plot-freq','Dominant Freq (Hz)',f1,f2);
  const [a1,a2]=gen(0.2);makePlot('plot-fft','FFT Magnitude',a1,a2);
  setInterval(()=>{const t=new Date();['plot-rms','plot-tilt','plot-freq','plot-fft'].forEach((id,i)=>{const a=[0.1,0.5,5,0.2][i];Plotly.extendTraces(id,{y:[[a*Math.sin(t/2500)+a*0.3*(Math.random()-0.5)],[a*Math.cos(t/3000)+a*0.3*(Math.random()-0.5)]],x:[[t],[t]]},[0,1]);});},2000);
});
</script>
</body>
</html>
